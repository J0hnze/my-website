{{ define "main" }}
<div class="container">
    <header class="section-header">
        <h1>{{ .Title }}</h1>
    </header>

    <div class="post-grid">
        {{ range .Pages }}
        <article class="post-card">
            <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
            <hr class="card-hr" />
            {{ if .Params.tags }}
            <div class="tags">
                {{ range first 6 .Params.tags }}
                <span class="tag">{{ . }}</span>
                {{ end }}
            </div>
            <hr class="card-hr" />
            {{ end }}
            <p class="subtitle">{{ with .Params.subtitle }}{{ . }}{{ else }}{{ .Description }}{{ end }}</p>
            <time datetime="{{ .Date.Format "2006-01-02" }}" class="post-date">{{ .Date.Format "January 2, 2006" }}</time>
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
